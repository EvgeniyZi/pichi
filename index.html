<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pichi</title>
</head>
<body>
    <div class="form-panel">
        <button class="close-form-panel-btn">X</button>
        <form action="" name="формаСбораДанныхКормления" class="форма-сбора-данных-кормления">
            <label>
                <p>Укажи кол-во съеденых сверчков</p>
                <input type="number" name="количествоСъеденыхСверчков" placeholder="0" min="0" max="100" step="1" required>
            </label>
            <label>
                <p>Витамины</p>
                <input type="text" name="типВитамин" list="списокВитамин" placeholder="выбери...">
                <datalist id="списокВитамин">
                    <option value="без витаминов"></option>
                    <option value="D3/Calcium"></option>
                    <option value="Витамины"></option>
                </datalist>
            </label>
            <label>
                <p>Дополнительное описание</p>
                <textarea name="описаниеТекущегоКормления" id="" placeholder="Общее описание"></textarea>
            </label>
            <button class="add-day-btn" type="submit">Отметить день</button>
            <button class="удалить-последнюю-запись">Удалить последнюю запись</button>
        </form>
    </div>
    <button class="burger-menu-btn">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <div class="tools-panel">
        <button class="tools-panel__close-btn"></button>
        <button class="test">Test</button>
        <button class="save-copy-file">Сделать резервную копию</button>
        <input type="file" class="upload-backup-input" accept=".json">
        <div cass="tools-panel__status-log">Система готова</div>
    </div>
    <section class="info-section">
        <div class="calendar__header info-section__header">
            <span class="calendar__year"></span>
            <button type="button" class="calendar__btn calendar__btn--prev">&lt;</button>
            <span class="calendar__month-name">Июнь</span>
            <button type="button" class="calendar__btn calendar__btn--next">&gt;</button>
        </div>
        <div class="calendar info-section__calendar"></div>
    </section>
    <div class="feed-days-list">
        <ul class="лист_кормлений">
            <li>1</li>
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
