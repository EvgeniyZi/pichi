<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./icons/favicon.ico?v=1" sizes="any">
    <link rel="icon" href="./icons/favicon-32x32.png?v=1" type="image/png" sizes="32x32">
    <link rel="icon" href="./icons/favicon-192x192.png?v=1" type="image/png" sizes="192x192">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png?v=1">

    <title>Pichi</title>

<body>
    <div class="form-panel">
        <button class="close-form-panel-btn">X</button>
        <form action="" name="формаСбораДанныхКормления" class="форма-сбора-данных-кормления">
            <label>
                <p>Укажи кол-во съеденых сверчков</p>
                <input type="number" name="количествоСъеденыхСверчков" placeholder="0" min="0" max="100" step="1" required>
            </label>
            <label>
                <p>Витамины</p>
                <input type="text" name="типВитамин" list="списокВитамин" placeholder="выбери...">
                <datalist id="списокВитамин">
                    <option value="без витаминов"></option>
                    <option value="D3/Calcium"></option>
                    <option value="Витамины"></option>
                </datalist>
            </label>
            <label>
                <p>Дополнительное описание</p>
                <textarea name="описаниеТекущегоКормления" id="" placeholder="Общее описание"></textarea>
            </label>
            <button class="add-day-btn" type="submit">Отметить день</button>
            <button class="удалить-последнюю-запись">Удалить последнюю запись</button>
        </form>
    </div>

            </svg>
        </button>
    </div>
    <div class="tools-panel" >
        <button class="tools-panel__close-btn">X</button>
        <!-- <button class="test">Test</button> -->
        <button class="save-copy-file">Сделать резервную копию в файл</button>
        <label>
            <p>Действие с данными из файла</p>
            <input type="file" class="upload-backup-input" accept=".json">
            <button class="merge-data-files-localStorage">Объединить данные из файла с локальным хранилищем</button>
            <button class="save-data-files-to-localStorage">Заменить данными из файла в локальном хранилище</button>
        </label>
        <div class="tools-panel__status-log">Система готова!</div>
    </div>
    <section class="info-section wrapper">
        <div class="calendar__header wrapper info-section__header">
            <span class="calendar__year"></span>
            <button type="button" class="calendar__btn calendar__btn--prev" title="предыдущий месц">&lt;</button>
            <span class="calendar__month-name">Июнь</span>
            <button type="button" class="calendar__btn calendar__btn--next" title="следующий месяц">&gt;</button>
        </div>
        <div class="calendar wrapper info-section__calendar"></div>
    </section>
    <div class="feed-days-list wrapper">
        <ul class="лист_кормлений">
        </ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
